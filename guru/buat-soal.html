<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Buat Soal Matematika</title>

  <!-- CSS UTAMA -->
 <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/buat-soal.css">
  
 <!-- FONT AWESOME -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- MATHJAX (RUMUS MATEMATIKA) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="brand">
    <img src="../assets/img/logo-sekolah.png" class="brand-logo" alt="Logo Sekolah">
    <div class="brand-text">
      <strong>SMPN 20 KONAWE SELATAN</strong>
      <small>CBT Application</small>
    </div>
  </div>
</header>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2><i class="fa fa-chalkboard-teacher"></i> Guru</h2>

    <ul class="menu">
      <li>
        <a href="dashboard-guru.html" class="active">
          <i class="fa fa-home"></i> Dashboard
        </a>
      </li>
      <li>
        <a href="buat-soal.html">
          <i class="fa fa-pen"></i> Buat Soal
        </a>
      </li>
      <li>
        <a href="bank-soal.html">
          <i class="fa fa-book"></i> Bank Soal
        </a>
      </li>
       <li>
        <a href="koreksi-essay.html">
          <i class="fa fa-book"></i> Koreksi Essay
        </a>
      </li>
      <li>
        <a href="rekap-nilai.html">
          <i class="fa fa-chart-column"></i> Rekap Nilai
        </a>
      </li>
    </ul>

    <button class="logout" id="logout">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </aside>
  
  <!-- ================= CONTENT ================= -->
  <main class="content">
    <div class="container">

      <h1>Buat Soal PG & Esai</h1>

      <!-- ===== INFO UJIAN ===== -->
      <section class="form-section">
        <div class="form-row">
          <input id="judulUjian" type="text" placeholder="Judul Ujian (contoh: SAS)">
          <input id="mapelInput" type="text" placeholder="Mata Pelajaran (contoh: Matematika)">
          <input id="kelasInput" type="text" placeholder="Kelas (contoh: VII)">
        </div>
      </section>


      <!-- ===== AKSI ===== -->
      <section class="form-section">
<div class="form-row">

  <button type="button" onclick="downloadTemplate()">
    ⬇️ Template Word
  </button>

  <input type="file" id="fileImport"
  style="display:none"
  accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document">

<button type="button" onclick="document.getElementById('fileImport').click()">
  📥 Import Word
</button>

  <button type="button" onclick="tambahSoal()">
    ➕ Tambah Soal
  </button>

  <button type="button" id="btnSimpan">
    💾 Simpan
  </button>

</div>
      </section>

      <!-- ===== PREVIEW ===== -->
      <section class="form-section">
        <button type="button" onclick="previewSoal()">
          👁️ Preview Soal
        </button>

        <div id="previewBox" class="preview-box" style="display:none;">
          <h3>Preview Soal (Tampilan Siswa)</h3>

          <div id="previewPG"></div>
          <hr>
          <div id="previewEsai"></div>
        </div>
      </section>

      <hr>

      <!-- ===== DAFTAR SOAL ===== -->
      <section>
        <h3>Daftar Soal</h3>
        <div id="daftarSoal"></div>
      </section>

    </div>
  </main>

</div>

<!-- ================= TOAST ================= -->
<div id="toast"></div>

<!-- ================= LIBRARY ================= -->
<!-- MAMMOTH -->
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<!-- DOCX -->
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<!-- ================= SCRIPT ================= -->
<script type="module" src="../assets/js/buat-soal.js"></script>
<script type="module" src="../assets/js/logout.js"></script>

</body>
</html>
